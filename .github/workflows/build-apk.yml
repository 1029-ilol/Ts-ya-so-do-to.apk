name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            cmake \
            gettext \
            pkg-config \
            unzip \
            zip

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Cache Android SDK/NDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.buildozer/cache
          key: buildozer-android-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-android-

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: dinogame-debug-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log (if build failed)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: build.log
